baseURL = "https://kingtuo123.com/"
title = "King's Blog"
theme = "hugo-notes"

# 禁用标签分类/文章列表页等
disableKinds = ["taxonomy", "term", "section"]
# 生成 robots.txt
enableRobotsTXT = true

[params]
    # 默认主题 light 或 dark 或 auto
    defaultTheme = "dark"
    # 主页头像，放在 static 目录下
    profileAvatar = "avatar.svg"
    # 头像下的名称
    profileName  = "King's Blog"
    # 标语
    profileSlogan = "夜夜夜夜夜夜夜夜夜不能寐吗？"
    # 文章纠错按钮
    articleCorrection = false

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true
	[markup.tableOfContents]
		endLevel = 4
		ordered = false
		startLevel = 2
	[markup.highlight]
		noClasses = false
		guessSyntax = true
		codeFences = true

